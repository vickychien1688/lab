<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAS English Lab · 英語跟讀教室</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body>
  <div class="wrap">
    <p class="brand">PAS ENGLISH LAB</p>
    <div class="card">
      <div class="title-badge">🎧 英語跟讀教室</div>
      <p class="hint">請選擇年級與書本進入錄音教室：</p>
      <div id="classList" class="class-links">
        <p class="hint" id="loading">載入中…</p>
      </div>
    </div>
    <p style="text-align:center"><a href="admin.html" class="hint">老師後台 →</a> &nbsp;·&nbsp; <a href="manual.html" class="hint">老師使用手冊 📖</a></p>
  </div>

  <script src="assets/config.js"></script>
  <script>
    (async () => {
      const box = document.getElementById('classList');
      try {
        const r = await apiCall({ action: 'classes' });
        if (!r.ok || !r.classes.length) { box.innerHTML = '<p class="hint">尚未建立任何書本，請先到老師後台新增。</p>'; return; }
        const grades = {};
        r.classes.forEach(c => {
          const g = c.gradeId || c.classId;
          if (!grades[g]) grades[g] = { name: c.gradeName || c.className || g, order: c.order || 0, books: [] };
          grades[g].books.push(c);
          grades[g].order = Math.min(grades[g].order, c.order || 0);
        });
        const list = Object.values(grades).sort((a, b) => (a.order || 0) - (b.order || 0));
        box.innerHTML = list.map(g => `
          <div class="grade-title">${esc(g.name)}</div>
          ${g.books.slice().sort((a, b) => (a.order || 0) - (b.order || 0)).map(b => `
            <a class="class-link" href="student.html?class=${encodeURIComponent(b.classId)}">
              <span><b>${esc(b.bookTitle || b.classId)}</b></span>
              <span class="go">進入 →</span>
            </a>`).join('')}`).join('');
      } catch (e) {
        box.innerHTML = '<p class="hint">連線失敗，請確認 config.js 的 API_URL 已設定正確。</p>';
      }
    })();
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  </script>
</body>
</html>
