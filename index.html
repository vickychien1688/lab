<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學生登入 · 愉閱空間 Our Reading Space</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body>
  <div class="login-split">
    <!-- 左：品牌區 -->
    <div class="login-hero">
      <div class="hero-inner">
        <div class="hero-eyebrow">OUR READING SPACE</div>
        <h1 class="hero-title">愉閱空間<br>語感英文</h1>
        <p class="hero-desc">英語跟讀錄音練習平台。聽老師示範、跟著唸、送出錄音，分數與評語都在這裡。</p>
        <div class="hero-bar"></div>
      </div>
    </div>

    <!-- 右：登入表單 -->
    <div class="login-panel">
      <div class="login-box">
        <!-- 第一步：班級代碼 -->
        <div id="stepCode">
          <h2 class="panel-title">歡迎回來</h2>
          <p class="panel-sub">請輸入班級代碼<span class="sep">｜</span>開始今天的練習</p>
          <label class="fld">班級代碼</label>
          <input id="codeInput" placeholder="輸入老師給的班級代碼" autocapitalize="off" onkeydown="if(event.key==='Enter')enterCode()">
          <button class="btn btn-primary" onclick="enterCode()">進　入</button>
          <p id="codeMsg" class="status"></p>
        </div>

        <!-- 第二步：選名字 -->
        <div id="stepName" class="hidden">
          <h2 class="panel-title">找到你的名字</h2>
          <p class="panel-sub" id="roomHint"></p>
          <div id="nameList" class="class-links"></div>
          <div id="pinBox" class="hidden">
            <label class="fld">輸入你的 PIN 碼</label>
            <input id="pinInput" type="tel" maxlength="6" placeholder="4 位數" onkeydown="if(event.key==='Enter')doLogin()">
            <button class="btn btn-primary" onclick="doLogin()">登　入</button>
            <p id="pinMsg" class="status"></p>
          </div>
          <div style="height:16px"></div>
          <button class="btn btn-ghost btn-sm" onclick="backToCode()">← 換班級代碼</button>
        </div>

        <p class="login-links">
          <a href="admin.html">老師後台</a> ·
          <a href="manual.html">手冊</a> ·
          <a href="browse.html">瀏覽所有書</a>
        </p>
      </div>
    </div>
  </div>

  <script src="assets/config.js"></script>
  <script>
    let ROOM = null, STUDENTS = [], PICKED = null;
    const el = id => document.getElementById(id);
    const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    if (localStorage.getItem('pas_student')) location.replace('my.html');

    async function enterCode() {
      const code = el('codeInput').value.trim();
      if (!code) return;
      el('codeMsg').innerText = '查詢中…';
      try {
        const r = await apiCall({ action: 'roomByCode', code });
        if (!r.ok) { el('codeMsg').innerText = '❌ ' + (r.error || '找不到這個代碼'); return; }
        ROOM = r.room; STUDENTS = r.students;
        el('roomHint').innerText = '班級：' + ROOM.roomName + '｜點選你的名字';
        el('nameList').innerHTML = STUDENTS.length
          ? STUDENTS.map((s, i) => `<a class="class-link" style="cursor:pointer" onclick="pickName(${i})"><span><b>${esc(s.name)}</b></span><span class="go">選我 →</span></a>`).join('')
          : '<p class="hint">這個班還沒有學生，請聯絡老師。</p>';
        el('stepCode').classList.add('hidden'); el('stepName').classList.remove('hidden');
        el('codeMsg').innerText = '';
      } catch (e) { el('codeMsg').innerText = '連線失敗，請稍後再試'; }
    }
    function pickName(i) {
      PICKED = STUDENTS[i];
      if (PICKED.hasPin) { el('pinBox').classList.remove('hidden'); el('pinInput').value = ''; el('pinInput').focus(); }
      else doLogin();
    }
    async function doLogin() {
      if (!PICKED) return;
      const pin = el('pinInput') ? el('pinInput').value.trim() : '';
      el('pinMsg').innerText = '登入中…';
      try {
        const r = await apiCall({ action: 'studentLogin', studentId: PICKED.studentId, pin });
        if (!r.ok) { el('pinMsg').innerText = '❌ ' + (r.error || '登入失敗'); return; }
        localStorage.setItem('pas_student', JSON.stringify({
          studentId: r.student.studentId, name: r.student.name,
          roomId: r.student.roomId, roomName: (r.room && r.room.roomName) || ROOM.roomName || ''
        }));
        location.href = 'my.html';
      } catch (e) { el('pinMsg').innerText = '連線失敗'; }
    }
    function backToCode() {
      el('stepName').classList.add('hidden'); el('stepCode').classList.remove('hidden');
      el('pinBox').classList.add('hidden'); PICKED = null;
    }
  </script>
</body>
</html>
